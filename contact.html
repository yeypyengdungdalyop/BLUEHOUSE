<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT US</title>
</head>
<body>
    <header> 
        <h1> Contact Us </h1>
    </header>
    <main> 
        <form action="#" method="post"> </form>
       <label for="name"> Name: </label>
        <input type="name" name="name" id="name"> <br>

        <label for="email"> Email: </label>
        <input type="email" name="email" id="email" placeholder="zeal@gmail.com"> <br>

        <label for="password"> Pasword: </label>
        <input type="password" name="password" id="password" placeholder="password"> <br>

        <label for="repeat password"> Repeat Password: </label>
        <input type="password" name="repeat password" id="repeat password" placeholder="password"> <br>

        <label for="Gender"> MALE </label>
        <input type="radio" name="Gender"  id="male" value="male">

        <label for="Gender"> FEMALE </label>
        <input type="radio" name="Gender"  id="female" value="female"> 

        <label for="Gender"> CUSTOM </label>
        <input type="radio" name="Gender"  id="custom" value="custom">

       <h1> SKILLS </h1>
       <label for="html"> HTML </label>
       <input type="checkbox" value="HMTL" id="HTML"> <br>
       <label for="css"> CSS </label>
       <input type="checkbox" value="CSS" id="CSS"> <br>
        <label for="js"> JS </label>
       <input type="checkbox" value="JS" id="JS"> <br>
       <label for="php"> PHP </label>
       <input type="checkbox" value="PHP" id="PHP"> 
</main>
<input type="submit" value="SUBMIT"> 
    </main>

</body>
</html>
